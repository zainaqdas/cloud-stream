<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStreamer | Personal Media Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .emerald-glow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="border-b border-white/5 bg-black/20 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                    <svg class="text-black w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-tight">CloudStreamer</h1>
                    <p class="text-[10px] uppercase tracking-widest text-emerald-500 font-bold opacity-80">Python Engine</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-12 w-full">
        <div class="grid lg:grid-cols-[1fr_380px] gap-12">
            <div class="space-y-6">
                <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/5 shadow-2xl relative">
                    <video id="video" controls class="w-full h-full object-contain"></video>
                    <div id="loader" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm z-10">
                        <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p class="text-emerald-500 font-bold tracking-widest uppercase text-[10px]">Extracting Stream...</p>
                    </div>
                </div>
            </div>

            <div class="space-y-8">
                <div class="glass p-6 rounded-3xl space-y-4">
                    <h2 class="text-xs font-bold uppercase tracking-widest text-white/40">Configuration</h2>
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest font-bold text-white/40 ml-1">Video Source URL</label>
                            <input id="urlInput" type="text" placeholder="YouTube, Twitch, Vimeo..." class="w-full bg-black border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500/50 transition-colors placeholder:text-white/10">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] uppercase tracking-widest font-bold text-white/40 ml-1">Quality</label>
                            <select id="qualitySelect" class="w-full bg-black border border-white/10 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500/50 transition-colors">
                                <option value="best">Best Available</option>
                                <option value="720p">720p</option>
                                <option value="480p">480p</option>
                                <option value="360p">360p</option>
                            </select>
                        </div>
                        <button id="playBtn" class="w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-emerald-500 transition-all">
                            Initialize Stream
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const video = document.getElementById('video');
        const urlInput = document.getElementById('urlInput');
        const qualitySelect = document.getElementById('qualitySelect');
        const playBtn = document.getElementById('playBtn');
        const loader = document.getElementById('loader');
        let hls = null;

        playBtn.addEventListener('click', async () => {
            const url = urlInput.value;
            if (!url) return;

            loader.classList.remove('hidden');
            playBtn.disabled = true;

            try {
                const response = await fetch('/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, quality: qualitySelect.value })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                if (Hls.isSupported()) {
                    if (hls) hls.destroy();
                    hls = new Hls();
                    hls.loadSource(data.streamUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.play();
                        loader.classList.add('hidden');
                        playBtn.disabled = false;
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = data.streamUrl;
                    video.addEventListener('loadedmetadata', () => {
                        video.play();
                        loader.classList.add('hidden');
                        playBtn.disabled = false;
                    });
                }
            } catch (err) {
                alert('Error: ' + err.message);
                loader.classList.add('hidden');
                playBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
